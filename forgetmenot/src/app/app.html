<p-toast></p-toast>
<router-outlet></router-outlet>
@if (showLoginModal) {
  <app-login-modal (close)="onModalClose()"></app-login-modal>
}
@if (isLoggedIn()) {
  <button (click)="onLogOut()">Logout</button>
}
<div class="page" (click)="onClick($event)">
  <h1 class="title" (click)="$event.stopPropagation()">{{ title() }}</h1>
  @if (showInput) {
    <app-user-input [x]="inputX" [y]="inputY"></app-user-input>
  }
</div>
