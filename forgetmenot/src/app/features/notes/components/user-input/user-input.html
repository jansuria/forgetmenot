<input
  class="user-input"
  [(ngModel)]="userText"
  placeholder="write a note..."
  (keydown.enter)="onNoteSave()"
  autofocus
/>

@if ((notes$ | async)?.length) {
  <ul>
    @for (note of notes$ | async; track note.id) {
      <li>{{ note.userNote }}</li>
      <button (click)="deleteUserNote(note)">delete</button>
    }
  </ul>
}
