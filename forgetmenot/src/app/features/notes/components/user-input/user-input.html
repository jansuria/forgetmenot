<input
  class="user-input"
  [(ngModel)]="userText"
  placeholder="write a note..."
  (keydown.enter)="onNoteSave()"
  autofocus
/>
<button (click)="getUserNotes()">Show your notes!</button>

<ul>
  @for (note of notes$ | async; track note.userId) {
    <li>{{ note.note }}</li>
    <button (click)="deleteUserNote(note)">delete</button>
  }
</ul>
